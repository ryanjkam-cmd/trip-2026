            ) : (
              <button
                onClick={() => onResolve && onResolve(a.title)}
                style={{width:"100%", padding:"9px 12px", background:"var(--accent)", color:"var(--accent-ink)", border:"none", borderRadius:8, fontFamily:'"Archivo",sans-serif', fontWeight:800, fontSize:11, textTransform:"uppercase", letterSpacing:"0.05em", cursor:"pointer"}}
              >Mark as resolved</button>
            )}
          </div>
        )}
      </aside>
    </React.Fragment>
  );
}

/* helpers for the drawer */
function longDescription(a) {
  if (a.desc) return a.desc;
  const map = {
    "Blue Lagoon": "Silica-rich geothermal seawater at 99°F, naturally heated by Iceland's volcanic system. The milky-blue color comes from silica, algae, and minerals — it looks photoshopped in real life. Premium package includes silica mask, algae mask, an in-water bar drink, robe, towel, and slippers. Ramp entry makes this the most accessible luxury experience in Iceland. Arrive at your 10am slot early. Janelle: the heat is genuinely therapeutic — soak as long as you like. Greyson: the water really is that color.",
    "⭐ INTO THE GLACIER — Langjökull": "The only man-made tunnel bored inside a glacier in the world — 500m of ice chambers cut into Langjökull, Iceland's second-largest ice cap. You ride an 8-wheel SuperJeep up the snowfield, then walk through carved rooms and hallways inside the glacier itself. Temperature inside: 32°F — wear your warmest base layer and jacket under the provided coverall. Crampons are provided. Jun 24 12:30pm — allow 3.5 hours total including mountain transport. Greyson: you can touch the volcanic ash layers trapped in the ice.",
    "⭐ Jökulsárlón Amphibian Boat Tour": "Glacial lagoon where icebergs calve live from Breiðamerkurjökull glacier and drift to the sea. Amphibian boat drives into the water from the shore — flat boarding, seated throughout. Walk-up only Jun–Sep daily 9am–7pm. Greyson: watch for seals resting on the icebergs. After the boat, walk 5 minutes to Diamond Beach — translucent ice chunks wash up on black volcanic sand. One of the most surreal places on Earth.",
    "Þingvellir National Park": "UNESCO World Heritage Site where the Eurasian and North American tectonic plates are physically pulling apart at 2.5 cm per year — you walk through the rift between two continents. Also the birthplace of Icelandic democracy: the Althing parliament was founded here in 930 AD. Flat boardwalk through the Almannagjá rift. Silfra fissure nearby has the clearest snorkeling water on the planet (Ryan + Greyson optional). Hakið visitor center is accessible for Janelle to rest.",
    "Geysir & Strokkur": "Strokkur erupts 25–40 meters every 6–10 minutes, reliably and dramatically. The original Geysir (which gave the world the word 'geyser') is mostly dormant but still enormous. Boardwalks make the area fully accessible — you can get within 10 meters of the eruption. Pro tip: watch Strokkur from upwind. The blue bubble that forms a second before eruption is the money shot. Benches available throughout.",
    "Reynisfjara Black Sand Beach": "Black volcanic sand with hexagonal basalt columns (Reynisdranga sea stacks) rising from the surf. 4-minute flat walk from Hotel Vík. ⚠️ Sneaker waves here are deadly — they hit with zero warning from calm-looking water. Stay 20+ feet from the waterline at all times. No exceptions. Evening golden hour is best for photos. The basalt columns are naturally formed from slow-cooling lava — they look man-made.",
    "Seljalandsfoss": "Waterfall where you can walk behind the curtain of water — a hollow in the cliff creates a full cave behind the falls. Front viewing is flat and accessible. The walk-behind trail (360 steps) is slippery and uneven — skip it for Janelle, optional for Ryan + Greyson. Mist raincoat strongly advised. Kvernufoss is 20 minutes away and gets 1% of the crowds.",
    "Skógafoss": "One of Iceland's most dramatic waterfalls — 60m drop, 25m wide. The base is flat and accessible. The staircase to the top (527 steps) is steep — skip it. Rainbow appears almost every morning in summer. The main viewpoint is only 100m walk from the car park. Mist makes a light rain jacket essential. Skógar Museum is walkable from here if you have time.",
    "Secret Lagoon, Flúðir": "Iceland's oldest swimming pool (1891) surrounded by geothermal springs and a small geyser. Less crowded than Blue Lagoon, fully natural. Water temperature 38–40°C. 20-minute drive from Hella. Ramp entry and accessible facilities. Great therapeutic option for Janelle. €25 per person. Snorkeling in the warm water is an option for Greyson.",
    "Katla Ice Cave (Ryan + Greyson)": "Natural volcanic ice cave inside Mýrdalsjökull glacier — different from man-made tunnel caves because the black volcanic ash from Katla eruptions creates dramatic dark layers through the ice. Super Jeep to the glacier, crampons and helmets provided. Janelle stays at Hotel Vík (10-min cab ride to a café). 4-hour tour. Book at katlatrack.is — sells out fast.",
    "Suomenlinna Fortress Island": "UNESCO-listed sea fortress on six islands connected by bridges — 15 minutes by ferry from Market Square. Paved main paths throughout. Built by Sweden in 1748, passed to Russia, then Finland. Greyson: the Vesikko submarine (WWII-era, walk-through) is the highlight. Church has a lighthouse. Café on the island. Buy the ferry ticket at the terminal — no advance booking needed.",
    "Allas Sea Pool": "Heated outdoor pools (27°C) directly on Helsinki's harbor, with 5 saunas including a wood-burning sauna. The Baltic sea swimming is optional (Greyson: the cold plunge is a rite of passage in Finland). Janelle: the warm pool is therapeutic and has easy water entry. 20-meter heated pool + children's pool. Restaurant and bar on site. Magical on a sunny Helsinki evening.",
    "Seaplane Harbour (Maritime Museum)": "WWI-era seaplane hangars housing the world's best maritime museum. Three historic vessels you walk through, including the submarine Lembit. Flat concrete floors throughout — best accessibility in Tallinn. Greyson: the flight simulator is legitimate. Café in the hangar. 10-minute walk or tram from Novotel. Go before noon to avoid tour groups.",
    "Kalev Spa Waterpark": "4 slides (longest is 82m), wave pool, hot tubs, saunas, and a separate therapeutic spa. Janelle: the warm therapeutic pools require a separate wristband — accessible changing facilities. Greyson: the slides are good, wave pool is the best feature. 40-minute tram ride from Old Town or 15-minute taxi. Indoor and outdoor areas. Lockers available.",
    "Tallinn Old Town + Ramparts": "Medieval old town — the best-preserved in northern Europe. Viru and Harju streets are flat and wheelchair-friendly. The Town Hall Square is completely paved. St. Olaf's Church tower has 232 steps and panoramic views (Ryan + Greyson). Janelle: benches throughout the square, coffee shops at every corner. Don't miss Katariina Käik — a narrow medieval passage with artisan workshops.",
    "⭐ Wieliczka Salt Mine": "Salt mine in continuous operation since the 13th century — nine levels and 300km of tunnels. The UNESCO highlight is St. Kinga's Chapel: a full-size church (54m long, 18m high) with floor, walls, ceiling, and chandeliers all hand-carved from salt. Call ahead to confirm Janelle's access — standard route includes 800 steps down but there is an elevator option (confirm booking). 2.5-hour guided tour, 64m underground, 55°F year-round.",
    "Market Square + Cloth Hall": "Rynek Główny — one of the largest medieval town squares in Europe. The Gothic Cloth Hall (Sukiennice) sits in the center, now housing a market of amber, linen, and local crafts. National Museum upstairs. Wawel Royal Castle visible from the south end. Flat stone paving throughout (some cobblestone at edges). St. Mary's Basilica trumpet signal plays every hour from the tower.",
    "Kazimierz Jewish Quarter": "Bohemian neighborhood and the historic center of Jewish life in Kraków. Flat wide streets with cafes, bookshops, and street art. Schindler's Factory Museum (20-min walk) is one of the most powerful WWII museums in Europe — multimedia, non-linear, Oskar Schindler's actual factory. Old Synagogue (1407) is the oldest in Poland. Budget 3 hours minimum for both.",
    "Prague Castle + St. Vitus Cathedral": "Largest castle complex in the world by area — 70,000 sq meters. Taxi to the top (steep hill), flat once inside. St. Vitus Cathedral took 600 years to build — the stained glass is extraordinary. Golden Lane: tiny medieval houses where Franz Kafka briefly lived. Greyson: ceremonial guard change on the hour. Allow 3 hours. The vista from the castle over Prague is the best in the city.",
    "Charles Bridge + Dragon Bridge": "14th-century stone bridge with 30 baroque statues lining both sides. Cobblestone but flat enough for steady walking. Best at dawn or dusk — midday is elbow-to-elbow with tourists. The statue of St. John of Nepomuk (the shiny one) is said to bring good luck if you touch it. Views of Prague Castle upstream and the Old Town downstream. Greyson: find the bridge tower and climb it.",
    "Old Town + Astronomical Clock": "The Astronomical Clock (Orloj) has been running since 1410. On the hour, the 12 apostles rotate in the windows above — genuinely impressive even now. Prague Old Town Square has the Týn Church's twin Gothic spires, the Baroque St. Nicholas Church, and a year-round Christmas market atmosphere. Flat stone paving. Trdelník pastries are a tourist trap but Greyson will want one anyway.",
    "Josefov Jewish Quarter": "Best-preserved Jewish quarter in Central Europe — six synagogues and the haunting Old Jewish Cemetery where 100,000 people are buried in 12 layers (running out of space for centuries). The Pinkas Synagogue has 80,000 names of Holocaust victims inscribed on its walls. Allow 2 hours. The cemetery is genuinely emotional — worth it.",
    "Anne Frank House": "The actual hiding place — the annex where Anne Frank and seven others hid for 761 days (1942–1944). You walk through the real rooms, see the actual bookcase that hid the door, and read pages from her diary. This is the museum that makes history real for a 12-year-old. Book tickets online now at annefrank.org — sells out weeks ahead. Limited daily capacity by design. No photos inside the hiding rooms.",
    "Rijksmuseum": "The greatest collection of Dutch Golden Age art in the world. Rembrandt's 'The Night Watch' (11 feet tall, in person) and Vermeer's 'The Milkwoman' are the anchors. The building itself is stunning — a massive neo-Gothic palace. Flat floors throughout with excellent accessible facilities. Book timed-entry tickets online. Allow 3 hours minimum — the collection is enormous. Free audio guide included with entry.",
    "Van Gogh Museum": "The largest Van Gogh collection in the world — over 200 paintings and 500 drawings. Chronological layout showing his progression from dark Dutch interiors to the Arles sunflowers to the final tortured Saint-Rémy works. Flat throughout, excellent accessibility. Book the same day as Anne Frank (they're 10 minutes apart) to minimize travel. The museum café has good Dutch sandwiches.",
    "NEMO Science Museum": "Five floors of hands-on science exhibits in a ship-shaped building — the best science museum in Europe for kids this age. Greyson: the electricity experiments, the DNA lab, and the rooftop water playground are the highlights. Accessible elevators throughout. Rooftop is free entry and has great harbor views. Allow 3–4 hours — it earns every minute.",
  };
  if (map[a.title]) return map[a.title];
  // Type-based fallback
  if (a.type === "flight") return `${a.meta}. Check your boarding pass for the latest gate and departure time. Arrive at the gate at least 45 minutes before departure.`;
  if (a.type === "stay") return `${a.meta}. Contact the hotel directly with any accessibility requirements before arrival.`;
  if (a.type === "transit") return a.meta;
  return a.meta;
}

function MapPlaceholder({ scale, cityName, cities, pins }) {
  return (
    <div className={"map-placeholder map-" + scale}>
      <svg width="100%" height="100%" viewBox="0 0 400 200" preserveAspectRatio="xMidYMid slice">
        <defs>
          <pattern id="mp-grid" width="20" height="20" patternUnits="userSpaceOnUse">
            <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(0,0,0,0.06)" strokeWidth="0.5"/>
          </pattern>
          <pattern id="mp-grid-2" width="80" height="80" patternUnits="userSpaceOnUse">
            <path d="M 80 0 L 0 0 0 80" fill="none" stroke="rgba(0,0,0,0.1)" strokeWidth="0.8"/>
          </pattern>
        </defs>
        <rect width="400" height="200" fill="#E8E4D7"/>
        <rect width="400" height="200" fill="url(#mp-grid)"/>
        <rect width="400" height="200" fill="url(#mp-grid-2)"/>
        {/* coastline-like blob */}
        <path d="M 0 130 Q 50 100 100 110 T 200 90 Q 250 80 320 95 T 400 110 L 400 200 L 0 200 Z" fill="#D2CFC2" opacity="0.7"/>
        <path d="M 30 50 Q 80 30 130 50 T 230 60 L 230 90 Q 180 80 130 80 T 30 80 Z" fill="#D2CFC2" opacity="0.4"/>
        {/* roads */}
        <path d="M 0 140 Q 100 130 200 135 T 400 130" fill="none" stroke="rgba(0,0,0,0.18)" strokeWidth="1.5" strokeDasharray="4 4"/>
        <path d="M 150 0 L 180 200" fill="none" stroke="rgba(0,0,0,0.12)" strokeWidth="1" strokeDasharray="3 3"/>
      </svg>
      <div className="map-pins">
        {(cities || pins || []).slice(0, 6).map((label, i) => (
          <div key={i} className="map-pin" style={{
            left: `${15 + (i * 14) % 70}%`,
            top: `${30 + ((i * 17) % 45)}%`,
          }}>
            <div className="map-pin-dot"></div>
            <div className="map-pin-label">{label}</div>
          </div>
        ))}
      </div>
      {scale === "city" && cityName && (
        <div className="map-corner-label caps">{cityName}</div>
      )}
      {scale === "region" && (
        <div className="map-corner-label caps">Region</div>
      )}
      <div className="map-attribution caps">Mock map · live map will load via Mapbox</div>
    </div>
  );
}

function NotePad({ dayId }) {
  const [notesByDay, setNotesByDay] = useState(() => {
    try {
      const saved = localStorage.getItem('trip_notes');
      return saved ? { ...INITIAL_NOTES, ...JSON.parse(saved) } : INITIAL_NOTES;
    } catch { return INITIAL_NOTES; }
  });
  const [draft, setDraft] = useState("");
  const [kind, setKind] = useState("idea");
  const notes = notesByDay[dayId] || [];

  const add = () => {
    if (!draft.trim()) return;
    const next = { ...notesByDay };
    next[dayId] = [
      { id: Date.now(), kind, by: "EH", when: "now", text: draft.trim() },
      ...(next[dayId] || []),
    ];
    setNotesByDay(next);
    try { localStorage.setItem('trip_notes', JSON.stringify(next)); } catch {}
    setDraft("");
  };
  const remove = (id) => {
    const next = { ...notesByDay };
    next[dayId] = (next[dayId] || []).filter(n => n.id !== id);
    setNotesByDay(next);
    try { localStorage.setItem('trip_notes', JSON.stringify(next)); } catch {}
  };

  return (
    <div className="notes">
      <div className="note-kinds">
        {NOTE_KINDS.map(k => (
          <button
            key={k.id}
            className={"note-kind " + (kind === k.id ? "on" : "")}
            onClick={() => setKind(k.id)}
          >{k.label}</button>
        ))}
      </div>
      <div className="note-input-row">
        <textarea
          className="note-input"
          placeholder={`Jot a quick ${kind}…`}
          value={draft}
          onChange={(e) => setDraft(e.target.value)}
          onKeyDown={(e) => { if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) add(); }}
        />
        <button className="note-add-btn" onClick={add} aria-label="Add note"><Icon.plus /></button>
      </div>
      {notes.length === 0 && (
        <div style={{fontSize:12, color:"var(--ink-3)", padding:"10px 4px", textAlign:"center"}}>No notes yet for this day. ⌘+Enter to save.</div>
      )}
      {notes.map(n => {
        const author = TRAVELERS.find(t => t.id === n.by) || TRAVELERS[0];
        return (
          <div key={n.id} className={"note " + n.kind}>
            <div className="nhead">
              <div className="left">
                <span className="av" style={{background: author.color}}>{author.id}</span>
                <span>{n.kind}</span>
                <span style={{color:"var(--ink-3)", textTransform:"none", letterSpacing:"normal", fontWeight:400}}>· {n.when}</span>
              </div>
              <button className="nx" onClick={() => remove(n.id)} aria-label="Remove">×</button>
            </div>
            <div className="nbody">{n.text}</div>
          </div>
        );
      })}
    </div>
  );
}

function ActivityNotes({ activityKey }) {
  const [notes, setNotes] = useState(() => {
    try {
      const saved = localStorage.getItem('trip_act_notes_' + activityKey);
      return saved ? JSON.parse(saved) : [];
    } catch { return []; }
  });
  const [draft, setDraft] = useState('');

  const add = () => {
    if (!draft.trim()) return;
    const next = [{ id: Date.now(), text: draft.trim(), when: new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) }, ...notes];
    setNotes(next);
    try { localStorage.setItem('trip_act_notes_' + activityKey, JSON.stringify(next)); } catch {}
    setDraft('');
  };
  const remove = (id) => {
    const next = notes.filter(n => n.id !== id);
    setNotes(next);
    try { localStorage.setItem('trip_act_notes_' + activityKey, JSON.stringify(next)); } catch {}
  };

  return (
    <div className="drawer-notes">
      <div style={{display:'flex', gap:8, marginBottom:8}}>
        <input
          style={{flex:1, border:'1.5px solid var(--line)', borderRadius:8, padding:'7px 10px', fontSize:13, fontFamily:'inherit', background:'var(--surface-2)', color:'var(--ink)', outline:'none'}}
          placeholder="Add a note…"
          value={draft}
          onChange={e => setDraft(e.target.value)}
          onKeyDown={e => { if (e.key === 'Enter') add(); }}
        />
        <button
          onClick={add}
          style={{background:'var(--accent)',color:'var(--accent-ink)',border:'none',borderRadius:8,padding:'7px 14px',fontSize:13,fontWeight:600,cursor:'pointer'}}
        >Add</button>
      </div>
      {notes.length === 0 && (
        <div style={{fontSize:12, color:'var(--ink-3)', textAlign:'center', padding:'10px 0'}}>No notes yet. Press Enter to save.</div>
      )}
      {notes.map(n => (
        <div key={n.id} className="drawer-note" style={{position:'relative', paddingRight:28}}>
          <span style={{fontSize:11, color:'var(--ink-3)', display:'block', marginBottom:4}}>{n.when}</span>
          {n.text}
          <button
            onClick={() => remove(n.id)}
            style={{position:'absolute',top:6,right:6,background:'none',border:'none',cursor:'pointer',fontSize:14,color:'var(--ink-3)',lineHeight:1}}
          >×</button>
        </div>
      ))}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
