============================================================ */
function Placeholder({ label, w = 96, h = 76, hue = 220 }) {
  const id = "stripe-" + label.replace(/\W/g, "");
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} style={{ display: "block", borderRadius: 8 }}>
      <defs>
        <pattern id={id} width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
          <rect width="8" height="8" fill={`oklch(0.92 0.02 ${hue})`} />
          <rect width="4" height="8" fill={`oklch(0.88 0.03 ${hue})`} />
        </pattern>
      </defs>
      <rect width={w} height={h} fill={`url(#${id})`} />
      <text x="50%" y="52%" textAnchor="middle" fontFamily="JetBrains Mono, monospace" fontSize="9" fill="rgba(0,0,0,.55)">{label}</text>
    </svg>
  );
}

  .activity .rating svg { color: oklch(0.74 0.15 70); }
  .activity .rev { color: var(--ink-3); }
  .activity .tags { display: flex; gap: 6px; }
  .tag {
    background: var(--line);
    color: var(--ink-2);
    padding: 2px 8px;
    border-radius: 99px;
    font-size: 11px;
    font-weight: 500;
  }
  .tag.mint { background: oklch(0.94 0.04 165); color: oklch(0.36 0.08 165); }
  .tag.hot  { background: var(--hot-soft); color: oklch(0.42 0.13 35); }
  .tag.lav  { background: oklch(0.94 0.03 295); color: oklch(0.38 0.07 295); }

  .activity .actions {
    display: flex; flex-direction: column; gap: 6px;
    align-items: center;
  }
  .actions .icon-circle {
    width: 30px; height: 30px; border-radius: 50%;
    display: grid; place-items: center;
    color: var(--ink-3);
    border: 1px solid var(--line);
    background: white;
  }
  .actions .icon-circle:hover { color: var(--ink); border-color: var(--line-2); }
  .actions .icon-circle.go { background: var(--accent); color: white; border-color: var(--accent); }
  .actions .icon-circle.go:hover { color: white; }

  /* time strip on left of activity */
  .time-strip {
    position: absolute;
    left: -54px;
    top: 50%;
    transform: translateY(-50%);
    text-align: right;
    width: 48px;
    font-family: "JetBrains Mono", monospace;
    font-size: 10.5px;
    color: var(--ink-3);
    line-height: 1.4;
  }
  .time-strip b { color: var(--ink-2); font-weight: 500; display: block; }

  .type-dot {
    position: absolute;
    left: -7px;
    top: 50%;
    transform: translateY(-50%);
    width: 14px; height: 14px;
    border-radius: 50%;
    background: white;
    border: 3px solid var(--ink-3);
  }
  .type-dot.accent { border-color: var(--accent); }
  .type-dot.mint   { border-color: oklch(0.65 0.13 165); }
  .type-dot.hot    { border-color: var(--hot); }
  .type-dot.muted  { border-color: var(--ink-3); }

  /* RIGHT PANEL */
  .rightpanel {
    border-left: 1px solid var(--line);
    background: var(--bg);
    padding: 20px 18px 24px;
    overflow-y: auto;
  }
  .card {
    background: white;
    border: 1px solid var(--line);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 14px;
  }
  .card-h {
    padding: 12px 14px 10px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .card-h .lbl {
    font-family: "Inter Tight"; font-size: 11px; font-weight: 600;
    color: var(--ink-3);
    text-transform: uppercase; letter-spacing: 0.1em;
  }
  .card-h .a {
    font-size: 11px; color: var(--accent-ink); font-weight: 500;
  }
  .card-body { padding: 0 14px 14px; }
  .card-body.tight { padding: 0 0 8px; }

  /* MINI CALENDAR */
  .cal-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 14px 4px;
  }
  .cal-head .m { font-family: "Inter Tight"; font-size: 13.5px; font-weight: 600; }
  .cal-head .ctrls { display: flex; gap: 2px; }
  .cal-head .ctrls button {
    width: 24px; height: 24px; border-radius: 6px;
    color: var(--ink-3);
  }
  .cal-head .ctrls button:hover { background: var(--line); color: var(--ink); }
  .cal-head .today {
    font-size: 11.5px; padding: 3px 9px; border-radius: 99px;
    border: 1px solid var(--line-2); color: var(--ink-2);
  }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    padding: 4px 8px 10px;
    font-size: 11px;
    text-align: center;
  }
  .cal-grid .wd {
    color: var(--ink-3);
    font-family: "Inter Tight"; font-weight: 600;
    font-size: 10px;
    padding: 4px 0;
  }
  .cal-grid .d {
    padding: 4px 0;
    color: var(--ink);
    font-variant-numeric: tabular-nums;
    border-radius: 6px;
    cursor: pointer;
    position: relative;
    margin: 1px;
    line-height: 18px;
    height: 22px;
  }
  .cal-grid .d:hover { background: var(--line); }
  .cal-grid .d.dim { color: var(--ink-3); }
  .cal-grid .d.trip { background: var(--accent-soft); color: var(--accent-ink); font-weight: 600; }
  .cal-grid .d.today {
    background: var(--accent);
    color: white;
    font-weight: 600;
  }
  .cal-grid .d.sel {
    outline: 2px solid var(--accent);
    outline-offset: -2px;
  }

  /* FLIGHT */
  .flight {
    padding: 8px 14px 14px;
  }
  .flight .conf {
    font-size: 11.5px;
    color: var(--ink-3);
    margin-bottom: 8px;
    display: flex; justify-content: space-between;
  }
  .flight .conf .num { font-family: "JetBrains Mono", monospace; color: var(--ink-2); }
  .flight .route {
    display: grid; grid-template-columns: 1fr auto 1fr;
    align-items: center; gap: 8px;
    margin-top: 6px;
  }
  .flight .iata {
    font-family: "Inter Tight"; font-size: 24px; font-weight: 700;
    letter-spacing: -0.01em;
  }
  .flight .iata.r { text-align: right; }
  .flight .dash {
    flex: 1; height: 1px;
    background: linear-gradient(to right, var(--ink-3) 50%, transparent 50%);
    background-size: 6px 1px;
    position: relative;
    min-width: 30px;
  }
  .flight .dash svg {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) rotate(45deg);
    background: white;
    padding: 0 4px;
    color: var(--ink-2);
  }
  .flight .city-line {
    display: grid; grid-template-columns: 1fr 1fr;
    color: var(--ink-3); font-size: 11.5px; margin-top: 2px;
  }
  .flight .city-line .r { text-align: right; }
  .flight .time-line {
    display: grid; grid-template-columns: 1fr 1fr;
    margin-top: 10px;
    font-size: 12px; color: var(--ink-2);
  }
  .flight .time-line .r { text-align: right; }
  .flight .time-line b { color: var(--ink); font-family: "Inter Tight"; font-weight: 600; font-size: 13px; display: block; }

  /* HOTEL */
  .hotel { padding: 8px 14px 14px; }
  .hotel .dates {
    font-size: 11.5px; color: var(--ink-3);
    font-family: "JetBrains Mono", monospace;
  }
  .hotel .name {
    font-family: "Inter Tight"; font-size: 18px; font-weight: 700;
    letter-spacing: -0.01em;
    margin: 2px 0 12px;
  }
  .hotel-img {
    width: 100%; height: 110px;
    border-radius: 8px;
    background: linear-gradient(135deg, oklch(0.78 0.05 235), oklch(0.62 0.07 235));
    position: relative;
    overflow: hidden;
    margin-bottom: 12px;
    display: grid; place-items: center;
  }
  .hotel-img .mark {
    font-family: "Inter Tight"; color: white;
    font-size: 24px; font-weight: 700;
    background: rgba(255,255,255,.18);
    padding: 8px 14px; border-radius: 6px;
    backdrop-filter: blur(4px);
    letter-spacing: 0.04em;
  }
  .hotel .row {
    display: flex; align-items: center; gap: 8px;
    color: var(--ink-2); font-size: 12.5px;
    padding: 5px 0;
  }
  .hotel .row svg { color: var(--ink-3); flex: none; }
  .hotel .conf-num {
    margin-top: 8px;
    padding-top: 10px;
    border-top: 1px dashed var(--line-2);
    display: flex; justify-content: space-between;
    font-size: 11.5px; color: var(--ink-3);
  }
  .hotel .conf-num b { color: var(--ink-2); font-family: "JetBrains Mono", monospace; }
  .hotel-map {
    margin-top: 12px;
    height: 90px; border-radius: 8px;
    background:
      repeating-linear-gradient(45deg, oklch(0.95 0.02 145) 0 4px, oklch(0.93 0.03 145) 4px 8px);
    position: relative;
    overflow: hidden;
    border: 1px solid var(--line);
  }
  .hotel-map::before {
    content: "";
    position: absolute; left: 20%; top: 30%; right: 30%; bottom: 20%;
    background: oklch(0.88 0.04 145);
    border-radius: 40%;
    opacity: 0.6;
  }
  .hotel-map .pin {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 26px; height: 26px;
    background: var(--ink); color: white;
    border-radius: 50%;
    display: grid; place-items: center;
    box-shadow: 0 0 0 4px rgba(255,255,255,.6);
  }

  /* TASKS */
  .tasks { padding: 4px 14px 12px; }
  .tasks-section-title {
    font-family: "Inter Tight"; font-weight: 700; font-size: 12.5px;
    color: var(--accent-ink);
    margin: 8px 0 4px;
  }
  .task {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 0;
    font-size: 12.5px;
    color: var(--ink);
  }
  .task .cb {
    width: 14px; height: 14px; border-radius: 50%;
    border: 1.5px solid var(--ink-3);
    flex: none;
    display: grid; place-items: center;
    color: white;
    transition: background .15s, border-color .15s;
  }
  .task.done .cb { background: var(--accent); border-color: var(--accent); }
  .task.done span { color: var(--ink-3); text-decoration: line-through; }
  .task:hover .cb { border-color: var(--ink); }
  .tasks-head {
    display: flex; justify-content: space-between;
    font-size: 11px; color: var(--ink-3);
    padding-bottom: 6px;
  }
  .tasks-head a { color: var(--accent-ink); }

  /* ============ TRIP HEALTH ============ */
  .health-strip {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 0;
    background: var(--bg);
    padding: 18px 24px 14px;
    border-bottom: 1px solid var(--line);
  }
  .health-card {
    padding: 0 18px;
    border-right: 1px dashed var(--line-2);
    display: flex; flex-direction: column; gap: 4px;
  }
  .health-card:first-child { padding-left: 0; }
  .health-card:last-child { border-right: none; padding-right: 0; }
  .health-card .lbl {
    font-family: "Inter Tight"; font-size: 10.5px; font-weight: 600;
    color: var(--ink-3);
    text-transform: uppercase; letter-spacing: 0.1em;
  }
  .health-card .val {
    font-family: "Inter Tight"; font-size: 22px; font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--ink);
    display: flex; align-items: baseline; gap: 4px;
  }
  .health-card .val.warn { color: var(--hot); }
  .health-card .val .of { color: var(--ink-3); font-size: 13px; font-weight: 500; }
  .health-card .sub { font-size: 11.5px; color: var(--ink-2); }
  .health-card .sub a { color: var(--accent-ink); text-decoration: underline; text-underline-offset: 2px; }
  .health-pill {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 7px;
    border-radius: 99px;
    font-size: 10.5px; font-weight: 600;
    font-family: "Inter Tight";
    align-self: flex-start;
    margin-top: 2px;
  }
  .health-pill.warn { background: var(--hot-soft); color: oklch(0.42 0.13 35); }
  .health-pill.ok   { background: oklch(0.94 0.04 145); color: oklch(0.4 0.12 145); }
  .health-pill.info { background: var(--accent-soft); color: var(--accent-ink); }

  /* ============ TRANSPORT CARD ============ */
  .transport {
    background: white;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 16px;
    display: grid;
    grid-template-columns: auto 1fr;
    column-gap: 16px;
    row-gap: 10px;
    align-items: start;
  }
  .transport-mode {
    width: 44px; height: 44px;
    border-radius: 10px;
    background: var(--accent-soft);
    color: var(--accent-ink);
    display: grid; place-items: center;
    grid-row: span 2;
  }
  .transport-head {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
  }
  .transport-head .route {
    font-family: "Inter Tight"; font-size: 15px; font-weight: 600;
    letter-spacing: -0.005em;
  }
  .transport-head .route .arr { color: var(--ink-3); margin: 0 6px; }
  .transport-head .meta {
    font-family: "JetBrains Mono", monospace;
    font-size: 11.5px;
    color: var(--ink-2);
  }
  .transport-grid {
    grid-column: 2;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    font-size: 12px;
  }
  .transport-grid .item .k {
    color: var(--ink-3);
    font-family: "Inter Tight"; font-size: 10.5px;
    text-transform: uppercase; letter-spacing: 0.08em;
    font-weight: 600;
    margin-bottom: 2px;
  }
  .transport-grid .item .v { color: var(--ink); }
  .transport-grid .item .v.warn {
    color: oklch(0.42 0.13 35);
    display: inline-flex; align-items: center; gap: 4px;
  }
  .transport-grid .item .v.ok {
    color: oklch(0.4 0.12 145);
    display: inline-flex; align-items: center; gap: 4px;
  }

  /* ============ STATUS BADGES on activities ============ */
  .status-row {
    display: flex; align-items: center; gap: 8px;
    margin-top: 8px;
    flex-wrap: wrap;
  }
  .status-badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 2px 8px 2px 6px;
    border-radius: 99px;
    font-size: 11px; font-weight: 600;
    font-family: "Inter Tight";
  }
  .status-badge.booked { background: oklch(0.94 0.04 145); color: oklch(0.36 0.1 145); }
  .status-badge.hold   { background: oklch(0.96 0.06 80);  color: oklch(0.4 0.13 70); }
  .status-badge.decide { background: var(--line); color: var(--ink-2); }
  .status-badge .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: currentColor;
  }
  .priority-flag {
    font-family: "Inter Tight"; font-size: 11px; font-weight: 600;
    color: var(--ink-3);
    display: inline-flex; align-items: center; gap: 4px;
  }
  .priority-flag .pdot {
    width: 6px; height: 6px; border-radius: 50%;
  }
  .priority-flag.must .pdot { background: var(--hot); }
  .priority-flag.nice .pdot { background: var(--ink-3); }
  .priority-flag.skip .pdot { background: var(--line-2); }
  .priority-flag.must { color: oklch(0.42 0.13 35); }
  .cancel-by {
    font-size: 11px; color: var(--ink-3);
    font-family: "JetBrains Mono", monospace;
  }
  .cancel-by b { color: var(--ink-2); }
  .weather-chip {
    font-size: 10.5px; padding: 2px 7px; border-radius: 99px;
    background: var(--accent-soft); color: var(--accent-ink);
    font-weight: 500;
    display: inline-flex; align-items: center; gap: 4px;
  }

  /* ============ WEATHER CARD ============ */
  .weather {
    padding: 4px 14px 14px;
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 14px;
    align-items: center;
  }
  .weather-icon {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: linear-gradient(135deg, oklch(0.95 0.03 235), oklch(0.88 0.04 235));
    display: grid; place-items: center;
    color: var(--accent-ink);
  }
  .weather-temp {
    font-family: "Inter Tight"; font-size: 24px; font-weight: 700;
    letter-spacing: -0.02em;
  }
  .weather-temp .lo { color: var(--ink-3); margin-left: 6px; font-weight: 500; }
  .weather-sum { font-size: 12.5px; color: var(--ink-2); }
  .weather-meta { color: var(--ink-3); font-size: 11.5px; margin-top: 2px; font-family: "JetBrains Mono", monospace; }
  .weather-alert {
    grid-column: 1 / -1;
    background: var(--hot-soft);
    color: oklch(0.36 0.13 35);
    padding: 8px 10px;
    border-radius: 8px;
    font-size: 11.5px;
    display: flex; align-items: flex-start; gap: 6px;
  }
  .weather-alert b { font-weight: 600; }
  .gear-row {
    grid-column: 1 / -1;
    display: flex; flex-wrap: wrap; gap: 5px;
    margin-top: 2px;
  }
  .gear-chip {
    font-size: 11px; padding: 2px 8px;
    background: var(--line);
    border-radius: 99px;
    color: var(--ink-2);
  }

  /* ============ BUDGET CARD ============ */
  .budget { padding: 4px 14px 12px; }
  .budget-total {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 8px;
  }
  .budget-total .amt {
    font-family: "Inter Tight"; font-size: 22px; font-weight: 700;
    letter-spacing: -0.02em;
  }
  .budget-total .of { color: var(--ink-3); font-size: 12px; }
  .budget-bar {
    height: 8px; background: var(--line); border-radius: 99px;
    overflow: hidden;
    display: flex;
    margin-bottom: 10px;
  }
  .budget-bar > div { height: 100%; }
  .budget-line {
    display: grid;
    grid-template-columns: 10px 1fr auto auto;
    align-items: center;
    gap: 8px;
    padding: 5px 0;
    font-size: 12px;
    border-bottom: 1px solid var(--line);
    white-space: nowrap;
  }
  .budget-line:last-child { border-bottom: none; }
  .budget-line .swatch {
    width: 10px; height: 10px; border-radius: 3px;
  }
  .budget-line .lbl { color: var(--ink); }
  .budget-line .spent {
    font-family: "JetBrains Mono", monospace;
    color: var(--ink-2);
    font-variant-numeric: tabular-nums;
    font-size: 11.5px;
  }
  .budget-edit-input {
    width: 68px;
    text-align: right;
    font-family: "Inter Tight", sans-serif;
    font-size: 12.5px;
    font-weight: 700;
    border: 1.5px solid var(--accent);
    border-radius: 4px;
    padding: 1px 4px;
    background: oklch(0.96 0.02 235);
    color: var(--ink);
    outline: none;
  }
  .budget-line .of {
    font-family: "JetBrains Mono", monospace;
    color: var(--ink-3); font-size: 11px;
    font-variant-numeric: tabular-nums;
  }

  /* ============ COLLABORATORS ============ */
  .collab { padding: 4px 14px 12px; }
  .traveler {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 0;
    border-bottom: 1px solid var(--line);
  }
  .traveler:last-child { border-bottom: none; }
  .traveler .av {
    width: 28px; height: 28px; border-radius: 50%;
    display: grid; place-items: center;
    color: white; font-size: 11px; font-weight: 600;
    font-family: "Inter Tight";
    flex: none;
    position: relative;
  }
  .traveler .av::after {
    content: "";
    position: absolute;
    right: -1px; bottom: -1px;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--ink-3);
    border: 2px solid white;
  }
  .traveler.online .av::after { background: oklch(0.6 0.18 145); }
  .traveler .name {
    font-size: 12.5px; font-weight: 500; color: var(--ink);
    font-family: "Inter Tight";
  }
  .traveler .role { font-size: 11px; color: var(--ink-3); }
  .traveler .perm {
    margin-left: auto; font-size: 11px; color: var(--ink-3);
    padding: 2px 7px; border-radius: 99px;
    background: var(--line);
  }
  .invite-row {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 0 2px;
    border-top: 1px dashed var(--line-2);
    margin-top: 8px;
  }
  .invite-input {
    flex: 1; padding: 6px 8px;
    border: 1px solid var(--line-2);
    border-radius: 6px; font: inherit;
    font-size: 12px;
    background: white;
    color: var(--ink);
  }
  .invite-input::placeholder { color: var(--ink-3); }
  .invite-btn {
    padding: 6px 12px;
    background: var(--ink); color: white;
    border-radius: 6px; font-size: 12px; font-weight: 500;
  }
  .feed { padding: 4px 14px 8px; }
  .feed-item {
    display: grid;
    grid-template-columns: 22px 1fr;
    gap: 8px;
    padding: 5px 0;
    align-items: flex-start;
  }
  .feed-av {
    width: 22px; height: 22px; border-radius: 50%;
    display: grid; place-items: center;
    color: white; font-size: 9px; font-weight: 600;
    font-family: "Inter Tight";
    flex: none;
    margin-top: 1px;
  }
  .feed-text {
    font-size: 12px; color: var(--ink-2);
    line-height: 1.4;
  }
  .feed-text b { color: var(--ink); font-weight: 600; }
  .feed-when {
    font-size: 10.5px; color: var(--ink-3);
    margin-top: 1px;
    font-family: "JetBrains Mono", monospace;
  }

  /* ============ FOOD RECS ============ */
  .food { padding: 4px 14px 12px; }
  .food-item {
    display: grid;
    grid-template-columns: 44px 1fr auto;
    gap: 10px;
    padding: 8px 0;
    align-items: center;
    border-bottom: 1px solid var(--line);
    cursor: pointer;
  }
  .food-item:last-child { border-bottom: none; }
  .food-item:hover .food-name { color: var(--accent-ink); }
  .food-thumb {
    width: 44px; height: 44px; border-radius: 8px;
    display: grid; place-items: center;
    background: var(--line);
    font-family: "Inter Tight"; font-weight: 700; font-size: 14px;
    color: var(--ink-2);
    letter-spacing: -0.01em;
  }
  .food-name {
    font-family: "Inter Tight"; font-size: 13px; font-weight: 600;
    line-height: 1.2;
    margin-bottom: 2px;
  }
  .food-meta {
    font-size: 11px; color: var(--ink-3);
    display: flex; gap: 6px;
  }
  .food-meta b { color: var(--ink-2); font-weight: 500; }
  .food-note {
    font-size: 11px; color: var(--ink-2);
    margin-top: 2px;
  }
  .food-actions {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .food-rating {
    display: inline-flex; align-items: center; gap: 3px;
    font-size: 11.5px; font-weight: 500;
    color: var(--ink);
  }
  .food-rating svg { color: oklch(0.74 0.15 70); }
  .food-add {
    width: 22px; height: 22px; border-radius: 50%;
    border: 1px solid var(--line-2);
    color: var(--ink-3);
    display: grid; place-items: center;
  }
  .food-add:hover { background: var(--ink); color: white; border-color: var(--ink); }

  /* ============ NOTES ============ */
  .notes { padding: 4px 14px 12px; }
  .note-input-row {
    display: flex; gap: 6px; align-items: stretch;
    margin-bottom: 10px;
  }
  .note-input {
    flex: 1;
    padding: 8px 10px;
    border: 1px solid var(--line-2);
    border-radius: 8px;
    font: inherit; font-size: 12.5px;
    color: var(--ink);
    background: white;
    resize: none;
    min-height: 56px;
    font-family: "Inter", sans-serif;
  }
  .note-input:focus { outline: 2px solid var(--accent); outline-offset: -1px; border-color: var(--accent); }
  .note-input::placeholder { color: var(--ink-3); }
  .note-add-btn {
    width: 30px; align-self: flex-end;
    height: 30px;
    border-radius: 8px;
    background: var(--accent); color: white;
    display: grid; place-items: center;
  }
  .note-kinds {
    display: flex; gap: 5px; margin-bottom: 8px;
    font-size: 11px;
  }
  .note-kind {
    padding: 3px 9px; border-radius: 99px;
    border: 1px solid var(--line-2);
    color: var(--ink-3); font-weight: 500;
    font-family: "Inter Tight";
    transition: background .12s, color .12s, border-color .12s;
  }
  .note-kind.on { background: var(--ink); color: white; border-color: var(--ink); }
  .note {
    padding: 9px 11px;
    border-radius: 8px;
    margin-bottom: 6px;
    position: relative;
    border: 1px solid var(--line);
  }
  .note.idea     { background: oklch(0.97 0.03 80); border-color: oklch(0.92 0.04 80); }
  .note.question { background: oklch(0.96 0.03 235); border-color: oklch(0.9 0.04 235); }
  .note.todo     { background: oklch(0.96 0.03 145); border-color: oklch(0.9 0.04 145); }
  .note .nhead {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 4px;
    font-size: 10.5px;
    color: var(--ink-3);
    font-family: "Inter Tight"; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.08em;
  }
  .note .nhead .left { display: flex; align-items: center; gap: 6px; }
  .note .nhead .av {
    width: 16px; height: 16px; border-radius: 50%;
    color: white; font-size: 8px; font-weight: 700;
    display: grid; place-items: center;
    font-family: "Inter Tight";
  }
  .note .nbody {
    font-size: 12.5px; color: var(--ink);
    line-height: 1.45;
  }
  .note .nx {
    width: 18px; height: 18px;
    border-radius: 50%;
    color: var(--ink-3);
    display: grid; place-items: center;
    opacity: 0;
    transition: opacity .15s, background .15s;
  }
  .note:hover .nx { opacity: 1; }
  .note .nx:hover { background: rgba(0,0,0,.06); color: var(--ink); }

  /* ============ added-by mini avatar on activity ============ */
  .by-row {
    display: inline-flex; align-items: center; gap: 4px;
    color: var(--ink-3); font-size: 11px;
  }
  .by-row .av {
    width: 16px; height: 16px; border-radius: 50%;
    color: white; font-size: 8px; font-weight: 700;
    display: grid; place-items: center;
    font-family: "Inter Tight";
  }
  .vote-pill {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 1px 7px;
    border-radius: 99px;
    background: var(--accent-soft);
    color: var(--accent-ink);
    font-size: 10.5px; font-weight: 600;
    font-family: "Inter Tight";
  }

  /* ============ SHARE CARD (simple, 2 people) ============ */
  .share-card { padding: 4px 14px 12px; }
  .share-people {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 12px;
  }
  .share-person {
    display: flex; align-items: center; gap: 8px;
    padding: 8px;
    border-radius: 8px;
    background: var(--bg);
    border: 1px solid var(--line);
  }
  .share-person .av {
    width: 30px; height: 30px; border-radius: 50%;
    display: grid; place-items: center;
    color: white; font-size: 11px; font-weight: 600;
    font-family: "Inter Tight";
    flex: none;
  }
  .share-person .name {
    font-size: 12.5px; font-weight: 600; color: var(--ink);
    font-family: "Inter Tight";
    line-height: 1.2;
  }
  .share-person .role { font-size: 11px; color: var(--ink-3); }
  .share-link-row {
    display: flex; gap: 6px;
    align-items: stretch;
  }
  .share-link {
    flex: 1;
    padding: 7px 10px;
    border: 1px solid var(--line-2);
    border-radius: 6px;
    background: white;
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    color: var(--ink-2);
    display: flex; align-items: center; gap: 6px;
    overflow: hidden;
  }
  .share-link span {
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .share-link svg { flex: none; color: var(--ink-3); }
  .copy-btn {
    padding: 6px 12px;
    background: var(--ink); color: white;
    border-radius: 6px; font-size: 12px; font-weight: 500;
    flex: none;
  }

  /* ============ WEATHER STRIP (horizontal, above transport) ============ */
  .weather-strip {
    background: white;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 14px;
    display: grid;
    grid-template-columns: auto auto 1fr auto;
    gap: 16px;
    align-items: center;
  }
  .weather-strip .ws-icon {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, oklch(0.95 0.03 235), oklch(0.88 0.04 235));
    display: grid; place-items: center;
    color: var(--accent-ink);
  }
  .weather-strip .ws-temp {
    font-family: "Inter Tight"; font-size: 22px; font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .weather-strip .ws-temp .lo { color: var(--ink-3); font-weight: 500; margin-left: 4px; font-size: 15px; }
  .weather-strip .ws-sum { font-size: 12.5px; color: var(--ink-2); margin-top: 3px; }
  .weather-strip .ws-meta {
    display: flex; align-items: center; gap: 8px;
    flex-wrap: wrap;
  }
  .weather-strip .ws-wind {
    font-family: "JetBrains Mono", monospace;
    font-size: 11.5px; color: var(--ink-3);
    padding: 3px 9px;
    border-radius: 99px;
    background: var(--bg);
  }
  .weather-strip .ws-alert {
    padding: 4px 10px;
    border-radius: 99px;
    background: var(--hot-soft);
    color: oklch(0.4 0.13 35);
    font-size: 11.5px;
    font-weight: 500;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .weather-strip .ws-gear {
    display: flex; gap: 5px; align-items: center;
    border-left: 1px solid var(--line);
    padding-left: 14px;
    flex-wrap: wrap;
  }
  .weather-strip .ws-gear-label {
    font-family: "Inter Tight"; font-size: 10.5px; font-weight: 600;
    color: var(--ink-3);
    text-transform: uppercase; letter-spacing: 0.08em;
    margin-right: 2px;
  }

  /* ============ DAY EXTRAS (notes + food below timeline) ============ */
  .day-extras {
    display: grid;
    grid-template-columns: 1.3fr 1fr;
    gap: 16px;
    margin-top: 24px;
  }
  .day-extras .card { margin-bottom: 0; }
  .day-extras-h {
    font-family: "Archivo", sans-serif; font-size: 11px; font-weight: 900;
    color: var(--ink-3);
    text-transform: uppercase; letter-spacing: 0.1em;
    grid-column: 1 / -1;
    margin-bottom: -8px;
    padding: 0 2px;
  }

  /* ============================================================
     === MOTION-MOTION DESIGN REFRESH ===
  ============================================================ */

  /* Type: section labels become ALL CAPS HEAVY */
  .lbl, .card-h .lbl, .nav-section-title,
  .country-tab, .allday, .health-card .lbl,
  .day-head .left .pretitle, .ws-gear-label, .tasks-section-title,
  .transport-head .meta {
    font-family: "Archivo", sans-serif !important;
    font-weight: 900 !important;
    text-transform: uppercase !important;
    letter-spacing: 0.04em !important;
  }
  .nav-section-title { font-size: 10.5px !important; }
  .card-h .lbl, .health-card .lbl, .country-tab { letter-spacing: 0.06em !important; }

  /* Brand mark: gradient diamond */
  .brand-mark {
    background: var(--grad-warm);
    color: white;
    border-radius: 4px;
    transform: rotate(45deg);
    width: 22px; height: 22px;
    font-size: 0;
    position: relative;
  }
  .brand-mark::after {
    content: "";
    position: absolute;
    inset: 4px;
    border: 1.5px solid white;
    border-radius: 2px;
  }
  .brand { gap: 14px; }
  .brand .display { font-family: "Archivo", sans-serif; font-weight: 900; font-size: 18px; text-transform: uppercase; letter-spacing: 0.03em; }
  .breadcrumb { font-family: "Archivo", sans-serif; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; font-size: 11px; }
  .breadcrumb b { font-weight: 900; color: var(--ink); }

  .invite {
    background: var(--ink);
    text-transform: uppercase;
    font-family: "Archivo", sans-serif;
    font-weight: 800;
    letter-spacing: 0.06em;
    font-size: 11px;
    padding: 0 14px;
    border-radius: 99px;
    height: 30px;
  }

  /* Title — BIG */
  .titleband { padding: 28px 24px 6px; }
  .titleband h1 {
    font-family: "Archivo", sans-serif !important;
    font-weight: 900;
    font-size: 44px;
    letter-spacing: -0.025em;
    line-height: 1;
    text-transform: uppercase;
  }
  .titleband .meta {
    font-family: "Archivo", sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-size: 11px;
    margin-top: 10px;
  }
  .titleband .meta-pill.mono {
    font-family: "JetBrains Mono", monospace;
    font-weight: 500;
    letter-spacing: 0.02em;
  }

  /* Trip health */
  .health-strip { padding: 20px 24px 18px; }
  .health-card { padding: 0 22px; }
  .health-card .lbl { font-size: 10.5px !important; color: var(--ink-3) !important; }
  .health-card .val {
    font-family: "Archivo", sans-serif !important;
    font-size: 30px;
    font-weight: 900;
    letter-spacing: -0.03em;
    line-height: 1;
    margin-top: 4px;
  }
  .health-card .val.warn {
    background: var(--grad-warm);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .health-pill {
    font-family: "Archivo", sans-serif !important;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-size: 10px;
    padding: 3px 10px;
  }
  .health-pill.warn { background: var(--grad-warm); color: white; }

  /* Country tabs */
  .country-tabs { gap: 6px; padding: 8px 24px 0; background: transparent; }
  .country-tab {
    font-family: "Archivo", sans-serif;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-size: 12px;
    padding: 12px 14px 14px;
    border-bottom: 3px solid transparent;
  }
  .country-tab.active { border-bottom: 3px solid transparent; position: relative; }
  .country-tab.active::after {
    content: "";
    position: absolute;
    left: 14px; right: 14px; bottom: -1px;
    height: 3px;
    background: var(--grad-warm);
    border-radius: 2px;
  }
  .country-tab .badge {
    font-family: "JetBrains Mono", monospace;
    font-weight: 600;
    letter-spacing: 0;
  }
  .country-tab.active .badge { background: var(--ink); color: white; }

  /* Left nav */
  .leftnav { background: transparent; border-right: 1px solid var(--line); }
  .city-item .name {
    font-family: "Archivo", sans-serif !important;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.01em;
    font-size: 13px;
  }
  .city-item .sub {
    font-family: "Archivo", sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-size: 10px;
  }
  .city-item.active { background: var(--ink); border-radius: 10px; }
  .day-link {
    padding: 7px 10px 7px 8px;
    font-size: 12.5px;
    border-radius: 8px;
  }
  .day-link .day-num {
    font-family: "Archivo", sans-serif !important;
    font-weight: 900;
    font-size: 10px;
    color: white;
    background: var(--ink-2);
    padding: 3px 6px;
    border-radius: 4px;
    letter-spacing: 0.04em;
    width: auto;
    line-height: 1;
  }
  .day-link.active { background: transparent; color: var(--ink); font-weight: 700; }
  .day-link.active .day-num {
    background: var(--grad-warm);
    color: white;
  }
  .days { border-left: 2px solid var(--line-2); margin-left: 14px; padding-left: 10px; }
  .quick-item {
    font-family: "Archivo", sans-serif;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-size: 11px;
  }

  /* Day header */
  .day-head { margin-bottom: 16px; }
  .day-head .left .pretitle {
    font-size: 11px !important;
    color: var(--ink-2) !important;
    margin-bottom: 6px;
  }
  .day-head .left h2 {
    font-family: "Archivo", sans-serif !important;
    font-size: 56px;
    font-weight: 900;
    letter-spacing: -0.04em;
    line-height: 0.92;
    text-transform: uppercase;
  }
  .day-head .left h2 .yr {
    background: var(--grad-warm);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    font-weight: 900;
  }
  .day-head .left .wd {
    font-family: "Archivo", sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-size: 11px;
    color: var(--ink-2);
    margin-top: 10px;
  }
  .view-toggle { border-radius: 99px; padding: 3px; }
  .view-toggle button {
    font-family: "Archivo", sans-serif;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-size: 10.5px;
    padding: 6px 12px;
    border-radius: 99px;
  }
  .view-toggle button.on { background: var(--ink); }
  .day-nav button { border-radius: 99px; }

  /* All-day */
  .allday {
    border-top: 2px solid var(--ink);
    color: var(--ink) !important;
    font-size: 10px !important;
    padding: 10px 0 6px;
  }

  /* Timeline */
  .hour {
    font-family: "Archivo", sans-serif !important;
    font-weight: 800 !important;
    font-size: 11px !important;
    color: var(--ink-2) !important;
    letter-spacing: 0.02em;
  }
  .hour-track { border-color: var(--line-2); }

  /* Activity card: vertical gradient wayfinding bar */
  .activity {
    background: #F4F6F8;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding-left: 18px;
    position: relative;
    overflow: hidden;
  }
  .type-dot {
    left: 0 !important;
    top: 0 !important;
    bottom: 0 !important;
    transform: none !important;
    width: 6px !important;
    height: auto !important;
    border-radius: 0 !important;
    border: none !important;
    background: var(--ink) !important;
  }
  .type-dot[data-tone="mint"] { background: var(--grad-do) !important; }
  .type-dot[data-tone="hot"] { background: var(--grad-eat) !important; }
  .type-dot[data-tone="accent"] { background: var(--grad-travel) !important; }
  .type-dot[data-tone="muted"] { background: var(--ink) !important; }

  .activity .time-strip {
    left: -56px !important;
    font-family: "Archivo", sans-serif !important;
    font-weight: 900;
    font-size: 13px !important;
    color: var(--ink) !important;
    letter-spacing: 0;
  }
  .activity .time-strip b { color: var(--ink) !important; font-size: 13px; }
  .activity .time-strip span { font-weight: 700; color: var(--ink-3); font-size: 10.5px; }

  .activity .title {
    font-family: "Archivo", sans-serif !important;
    font-weight: 900;
    font-size: 16px;
    text-transform: uppercase;
    letter-spacing: 0.005em;
  }
  .activity .desc { font-size: 12px; color: var(--ink-2); }

  /* Tags */
  .tag {
    font-family: "Archivo", sans-serif;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-size: 10px;
    padding: 3px 9px;
    color: white;
  }
  .tag.mint { background: var(--grad-do); color: white; }
  .tag.hot  { background: var(--grad-eat); color: white; }
  .tag.lav  { background: var(--grad-travel); color: white; }

  /* Status badges */
  .status-badge {
    font-family: "Archivo", sans-serif !important;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-size: 10px;
    padding: 3px 9px 3px 7px;
    color: white !important;
  }
  .status-badge.booked { background: linear-gradient(135deg, #00C48C, #00D9A6, #5EFFB8) !important; }
  .status-badge.hold   { background: var(--grad-warm) !important; }
  .status-badge.decide { background: var(--ink-2) !important; color: white !important; }
  .status-badge .dot { background: rgba(255,255,255,0.95); }

  .priority-flag {
    font-family: "Archivo", sans-serif !important;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-size: 10px;
  }
  .priority-flag.must {
    background: var(--grad-warm);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .priority-flag.must .pdot {
    background: var(--grad-warm);
    width: 8px; height: 8px;
  }

  .cancel-by { font-family: "JetBrains Mono", monospace; font-size: 10.5px; }
  .weather-chip {
    font-family: "Archivo", sans-serif;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-size: 10px;
    padding: 3px 9px;
    background: var(--grad-travel);
    color: white;
  }

  /* Mini calendar — gradient halo today */
  .cal-head .m {
    font-family: "Archivo", sans-serif !important;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-size: 14px;
  }
  .cal-head .today {
    font-family: "Archivo", sans-serif;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-size: 10px;
    border-radius: 99px;
  }
  .cal-grid .wd {
    font-family: "Archivo", sans-serif;
    font-weight: 900;
    font-size: 9px;
    letter-spacing: 0.1em;
  }
  .cal-grid .d {
    font-family: "Archivo", sans-serif;
    font-weight: 700;
    font-size: 11.5px;
  }
  .cal-grid .d.trip {
    background: transparent;
    color: var(--ink);
    font-weight: 900;
    box-shadow: inset 0 0 0 1.5px var(--line-2);

  .cal-grid .d.today {
    background: transparent !important;
    color: var(--ink) !important;
    font-weight: 900;
    position: relative;
    z-index: 1;
  }
  .cal-grid .d.today::before {
    content: "";
    position: absolute;
    inset: -4px;
    background: var(--grad-glow);
    border-radius: 50%;
    z-index: -1;
    filter: blur(4px);
    opacity: 0.85;
  }
  .cal-grid .d.sel { outline-color: var(--ink); }

  /* Flight */
  .flight .iata {
    font-family: "Archivo", sans-serif !important;
    font-size: 32px;
    font-weight: 900;
    letter-spacing: -0.02em;
  }
  .flight .conf { font-family: "Archivo", sans-serif; font-weight: 800; text-transform: uppercase; letter-spacing: 0.04em; font-size: 10.5px; }
  .flight .city-line {
    font-family: "Archivo", sans-serif; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; font-size: 10px;
  }
  .flight .time-line b { font-family: "Archivo", sans-serif !important; font-weight: 900; font-size: 16px; }
  .flight .time-line span { font-family: "Archivo", sans-serif; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; font-size: 10px; }

  /* Hotel */
  .hotel-img { background: var(--grad-travel) !important; }
  .hotel-img .mark {
    font-family: "Archivo", sans-serif;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .hotel .name {
    font-family: "Archivo", sans-serif !important;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: -0.01em;
    font-size: 19px;
  }
  .hotel .dates { font-family: "Archivo", sans-serif; font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em; font-size: 10px; }

  /* Transport */
  .transport { background: var(--panel); border-radius: 14px; padding: 16px 18px; }
  .transport-mode {
    background: var(--grad-warm);
    color: white;
    border-radius: 12px;

/* ============================================================
   ICAL EXPORT
============================================================ */
const DAY_DATES = [
  "20260621","20260622","20260623","20260624","20260625",
  "20260626","20260627","20260628","20260629","20260630",
  "20260701","20260702","20260703","20260704","20260705",
  "20260706","20260707","20260708","20260709","20260710",
  "20260711","20260712","20260713","20260714","20260715",
  "20260716","20260717"
];

function generateICS() {
  const lines = [
    "BEGIN:VCALENDAR",
    "VERSION:2.0",
    "PRODID:-//KamFamilyTrip2026//EN",
    "CALSCALE:GREGORIAN",
    "METHOD:PUBLISH",
  ];

  Object.keys(ACTIVITIES).forEach(dayId => {
    const idx = parseInt(dayId.replace("d",""), 10) - 1;
    const dateStr = DAY_DATES[idx];
    if (!dateStr) return;

    (ACTIVITIES[dayId] || []).forEach(a => {
      // Skip TBD times and pure transit with no real time
      if (!a.time || a.time === "TBD") return;
      if (a.type === "transit" && !a.end) return;

      const startTime = a.time.replace(":", "") + "00";
      const endTime = (a.end || a.time).replace(":", "") + "00";
      const dtStart = `${dateStr}T${startTime}`;
      const dtEnd = `${dateStr}T${endTime}`;

      let desc = a.meta || "";
      if (a.conf) desc += `\\nConf: ${a.conf}`;

      const uid = `${dayId}-${a.title.replace(/[^a-zA-Z0-9]/g,"")}@KamTrip2026`;

      lines.push("BEGIN:VEVENT");
      lines.push(`UID:${uid}`);
      lines.push(`DTSTART;TZID=UTC:${dtStart}`);
      lines.push(`DTEND;TZID=UTC:${dtEnd}`);
      lines.push(`SUMMARY:${a.title}`);
      if (desc) lines.push(`DESCRIPTION:${desc.replace(/\n/g,"\\n")}`);
      const addr = typeof addressFor === "function" ? addressFor(a) : "";
      if (addr) lines.push(`LOCATION:${addr}`);
      if (a.mapUrl) lines.push(`URL:${a.mapUrl}`);
      lines.push("END:VEVENT");
    });
  });

  lines.push("END:VCALENDAR");

  const blob = new Blob([lines.join("\r\n")], { type: "text/calendar;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "KamFamilyTrip2026.ics";
  a.click();
  URL.revokeObjectURL(url);
}

/* ============================================================
   APPLE MAPS HELPER
============================================================ */
function openMapsUrl(mapGoogleUrl, addrStr) {
  const isApple = /iPhone|iPad|iPod|Macintosh/.test(navigator.userAgent) && !window.MSStream;
  if (isApple) {
    return `https://maps.apple.com/?q=${encodeURIComponent(addrStr || mapGoogleUrl)}`;
  }
  return mapGoogleUrl;
}

  const [, forceWeatherRefresh] = React.useState(0);

                <div style={{fontSize:11,color:"var(--ink-3)",marginBottom:6,fontStyle:"italic"}}>{dayFlightAct.dayLabel}</div>
              )}
              <div className="route">
                <div className="iata">{(dayFlightAct.act.title.match(/([A-Z]{3})\s*→/) || [])[1] || "—"}</div>
                <div className="dash"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg></div>
                <div className="iata r">{(dayFlightAct.act.title.match(/→\s*([A-Z]{3})/) || [])[1] || "—"}</div>
              </div>
              <div className="time-line">
                <span><b>{dayFlightAct.act.time}</b><span>Departs</span></span>
                <span className="r"><b>{dayFlightAct.act.end}</b><span>Arrives</span></span>
              </div>
              {dayFlightAct.act.status === "booked" && (
                <div style={{marginTop:8,padding:"6px 10px",background:"oklch(0.95 0.03 145)",borderRadius:8,fontSize:11.5,color:"oklch(0.35 0.1 145)",fontWeight:600}}>✓ Booked · {dayFlightAct.act.conf}</div>
              )}
            </div>
          </div>
        ) : TRANSPORT[currentDay.id] ? (
          <div className="card">
            <div className="card-h"><span className="lbl">Today's drive</span></div>
            <div className="flight">
              <div className="conf"><span>{TRANSPORT[currentDay.id].from} → {TRANSPORT[currentDay.id].to}</span></div>
              <div className="route">
                <div className="iata" style={{fontSize:13}}>{TRANSPORT[currentDay.id].from}</div>
                <div className="dash"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg></div>
                <div className="iata r" style={{fontSize:13}}>{TRANSPORT[currentDay.id].to}</div>
              </div>
              <div className="time-line">
                <span><b>{TRANSPORT[currentDay.id].dep}</b><span>Depart</span></span>
                <span className="r"><b>{TRANSPORT[currentDay.id].distance}</b><span>{TRANSPORT[currentDay.id].duration}</span></span>
              </div>
              <div style={{marginTop:8,fontSize:11.5,color:"var(--ink-3)"}}>
                <div>Route: {TRANSPORT[currentDay.id].route}</div>
                {TRANSPORT[currentDay.id].fuel && <div style={{marginTop:2}}>⛽ {TRANSPORT[currentDay.id].fuel}</div>}
              </div>
            </div>
          </div>
        ) : null}

        {/* HOTEL */}
        <div className="card">
          <div className="card-h"><span className="lbl">Hotel</span><a className="a" href="#">Reservation</a></div>
          <div className="hotel">
            <div className="dates">{hotel.dates}</div>
            <div className="name">{hotel.name}</div>
            <div className="hotel-img">
              <div className="mark">{hotel.name.split(" ").map(w => w[0]).join("").slice(0,3)}</div>
            </div>
            <div className="row"><Icon.phone /> {hotel.phone}</div>
            <div className="row"><Icon.pin /> {hotel.addr}</div>
            <div className="conf-num">
              <span>Confirmation</span>
              <b>{hotel.conf}</b>
            </div>
            {hotel.mapUrl && (
              <div style={{borderRadius:10, overflow:"hidden", marginTop:10, border:"1px solid var(--line)"}}>
                <iframe
                  width="100%"
                  height="150"
                  frameBorder="0"
                  style={{display:"block"}}
                  src={`https://maps.google.com/maps?q=${encodeURIComponent(hotel.name + ', ' + hotel.addr)}&output=embed&zoom=15`}
                  allowFullScreen
                  loading="lazy"
                  title="hotel map"
                />
              </div>
            )}
            <div style={{display:"flex", gap:8, marginTop:10}}>
              {hotel.mapUrl && (
                <a href={hotel.mapUrl} target="_blank" rel="noopener noreferrer"
                   style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:6,padding:"8px 0",background:"var(--accent)",color:"var(--accent-ink)",borderRadius:8,fontSize:12,fontWeight:600,textDecoration:"none"}}>
                  <Icon.pin /> Maps
                </a>
              )}
            </div>
          </div>
        </div>

        {/* TRANSPORT MAP — shows on driving days */}
        {TRANSPORT[currentDay.id] && (() => {
          const t = TRANSPORT[currentDay.id];
          const transitAct = (ACTIVITIES[currentDay.id] || []).find(a => a.type === "transit" && a.mapUrl);
          const mapQ = transitAct?.mapUrl?.replace('https://maps.google.com/?q=','').split('&')[0].replace(/\+/g,' ');
          return (
            <div className="card">
              <div className="card-h"><span className="lbl">Route map</span>
                {transitAct?.mapUrl && <a className="a" href={transitAct.mapUrl} target="_blank" rel="noopener noreferrer">Open</a>}
              </div>
              <div style={{borderRadius:10, overflow:"hidden", border:"1px solid var(--line)"}}>
                  <iframe
                    width="100%"
                    height="150"
                    frameBorder="0"
                    style={{display:"block"}}
                    src={`https://maps.google.com/maps?saddr=${encodeURIComponent(t.from)}&daddr=${encodeURIComponent(t.to)}&output=embed`}
                    allowFullScreen
                    loading="lazy"
                    title="route map"
                  />
                </div>
              <div style={{marginTop:8, fontSize:11.5, color:"var(--ink-2)"}}>
                <b>{t.from} → {t.to}</b>
                <span style={{color:"var(--ink-3)", marginLeft:8}}>{t.distance} · {t.duration}</span>
              </div>
              {t.fuel && <div style={{fontSize:11, color:"var(--ink-3)", marginTop:4}}>⛽ {t.fuel}</div>}
              {t.parking && <div style={{fontSize:11, color:"var(--ink-3)", marginTop:2}}>🅿 {t.parking}</div>}
            </div>
          );
        })()}

        {/* BUDGET */}
        <div className="card">
          <div className="card-h"><span className="lbl">Budget</span><a className="a" href="#">Breakdown</a></div>
          <div className="budget">
            <div className="budget-total">
              <div>
                <div className="amt">${budgetSpent.toLocaleString()}</div>
                <div className="of">of ${budgetPlanned.toLocaleString()} planned · {budgetPlanned - budgetSpent < 0 ? "over" : "$" + (budgetPlanned - budgetSpent).toLocaleString() + " left"}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontFamily:"Inter Tight", fontSize:18, fontWeight:700, color:"var(--accent-ink)"}}>{Math.round(budgetSpent/budgetPlanned*100)}%</div>
                <div style={{fontSize:11, color:"var(--ink-3)"}}>committed</div>
              </div>
            </div>
            <div className="budget-bar">
              {BUDGET.lines.map((l, i) => {
                const spent = budgetActual[l.label] ?? l.spent;
                return <div key={i} style={{width: (spent / budgetPlanned * 100) + "%", background: l.color}} title={l.label}></div>;
              })}
            </div>
            {BUDGET.lines.map((l, i) => {
              const spent = budgetActual[l.label] ?? l.spent;
              return (
                <div key={i} className="budget-line">
                  <div className="swatch" style={{background: l.color}}></div>
                  <div className="lbl">{l.label}</div>
                  {editingBudget === l.label ? (
                    <input
                      className="budget-edit-input"
                      defaultValue={spent}
                      autoFocus
                      onBlur={e => updateBudget(l.label, e.target.value)}
                      onKeyDown={e => { if (e.key === 'Enter') updateBudget(l.label, e.target.value); if (e.key === 'Escape') setEditingBudget(null); }}
                    />
                  ) : (
                    <div className="spent" onClick={() => setEditingBudget(l.label)} title="Tap to edit" style={{cursor:'pointer'}}>${spent.toLocaleString()}</div>
                  )}
                  <div className="of">/ ${l.planned.toLocaleString()}</div>
                </div>
              );
            })}
          </div>
        </div>

        {/* TASKS */}
        <div className="card">
          <div className="card-h"><span className="lbl">Pre-trip checklist</span><a className="a" href="#" onClick={clearChecks}>Clear</a></div>
          <div className="tasks">
            <div className="tasks-head">
              <span>{doneCount} of {REMINDERS.length} done</span>
            </div>
            <div className="tasks-section-title">Before you go</div>
            {REMINDERS.map((r, i) => (
              <Task key={i} r={r} index={i} done={checks[i] ?? r.done} onToggle={toggleCheck} />
            ))}
          </div>
        </div>

      </aside>
    </div>
  );
}

function Task({ r, index, done, onToggle }) {
  return (
    <button className={"task " + (done ? "done" : "")} onClick={() => onToggle(index)}>
      <span className="cb">{done && <Icon.check />}</span>
      <span>{r.title}</span>
    </button>
  );
}

function ActivityCard({ a, onOpen }) {
  const tagTone = a.tone === "mint" ? "mint" : a.tone === "hot" ? "hot" : "lav";
  const statusLabel = { booked: "Booked", hold: "On hold", decide: "Decide" }[a.status] || "";
  const StatusIcon = a.status === "booked" ? Icon.checkSm : a.status === "hold" ? Icon.clock : Icon.q;
  if (a.type === "rest") {
    return (
      <div className="activity is-rest" style={{cursor:"default"}}>
        <div className="type-dot" style={{borderColor:"var(--ink-3)", flexShrink:0}}></div>
        <div className="time-strip" style={{minWidth:44}}><b style={{fontSize:11}}>{a.time}</b></div>
        <div className="info" style={{padding:"2px 0"}}>
          <div className="title" style={{fontSize:12, fontWeight:500, color:"var(--ink-3)"}}>{a.title}</div>
          {a.meta && <div className="desc" style={{fontSize:11, color:"var(--ink-3)", opacity:0.8}}>{a.meta}</div>}
        </div>
      </div>
    );
  }
  const isAlt = !!a.isAlt;
  return (
    <div className={"activity" + (isAlt ? " is-alt" : "")} onClick={onOpen} style={{cursor:"pointer"}}>
      <div className="type-dot" data-tone={a.tone} style={{borderColor: a.tone === "accent" ? "var(--accent)" : a.tone === "mint" ? "oklch(0.65 0.13 165)" : a.tone === "hot" ? "var(--hot)" : "var(--ink-3)"}}></div>
      <div className="time-strip"><b>{a.time}</b><span>{a.end}</span></div>

      <Placeholder label={a.img || a.type.toUpperCase()} w={96} h={76} hue={a.tone === "hot" ? 40 : a.tone === "accent" ? 235 : 165} />

      <div className="info">
        <div className="title">{a.title}{a.url && a.url.startsWith('./docs/') && <span style={{fontSize:"10px", fontWeight:700, color:"oklch(0.5 0.1 235)", marginLeft:"6px", background:"oklch(0.94 0.04 235)", padding:"1px 5px", borderRadius:"4px", verticalAlign:"middle"}}>PDF</span>}</div>
        <div className="desc">{a.meta}</div>
        {(a.rating || a.tags) && (
          <div className="row">
            {a.rating && (
              <span className="rating">
                <Icon.star /> {a.rating}
                <span className="rev">({a.reviews?.toLocaleString()})</span>
              </span>
            )}
            {a.tags && (
              <div className="tags">
                {a.tags.map((t, i) => <span key={i} className={"tag " + tagTone}>{t}</span>)}
              </div>
            )}
          </div>
        )}
        {(a.status || a.priority || a.cancelBy || a.weather) && (
          <div className="status-row">
            {a.status && (
              <span className={"status-badge " + a.status}>
                <StatusIcon /> {statusLabel}
                {a.conf && a.status !== "decide" && <span style={{opacity:0.7, fontFamily:"JetBrains Mono, monospace", fontWeight:500}}> · {a.conf}</span>}
              </span>
            )}
            {a.priority && a.priority !== "nice" && (
              <span className={"priority-flag " + a.priority}>
                <span className="pdot"></span>
                {a.priority === "must" ? "Must-do" : "Skip if tired"}
              </span>
            )}
            {a.cancelBy && (
              <span className="cancel-by">Cancel by <b>{a.cancelBy}</b></span>
            )}
            {a.weather && (
              <span className="weather-chip"><Icon.cloud /> Weather-dependent</span>
            )}
          </div>
        )}
      </div>

      {isAlt && a.timeNeeded && (
        <div style={{paddingLeft:0, marginTop:4, paddingBottom:6}}>
          <span className="alt-badge">⏱ Alt · {a.timeNeeded}</span>
        </div>
      )}
      <div className="actions" onClick={(e) => e.stopPropagation()}>
        <button className="icon-circle" aria-label="Save"><Icon.heart /></button>
        <button className="icon-circle go" aria-label="Open" onClick={onOpen}><Icon.ext /></button>
      </div>
    </div>
  );
}

/* ============================================================
   TRIP OVERVIEW
============================================================ */
function TripOverview({ onPickDay, onPickCity }) {
  const allDays = TRIP.countries.flatMap(c =>
    c.cities.flatMap(city =>
      city.days.map(d => ({...d, country: c, city }))
    )
  );

  const tripBooked = allDays.reduce((s, d) => s + (ACTIVITIES[d.id] || []).filter(a => a.status === "booked").length, 0);
  const tripDecide = allDays.reduce((s, d) => s + (ACTIVITIES[d.id] || []).filter(a => a.status === "decide").length, 0);
  const tripMust = allDays.reduce((s, d) => s + (ACTIVITIES[d.id] || []).filter(a => a.priority === "must").length, 0);
  const tripCost = allDays.reduce((s, d) => s + (ACTIVITIES[d.id] || []).reduce((cs, a) => cs + (a.cost || 0), 0), 0);

  return (
    <div className="trip-overview">
      <div className="to-hero">
        <div className="to-hero-left">
          <div className="to-pretitle">Trip overview</div>
          <h2 className="to-h2">8 Days · 2 Countries · 4 Cities</h2>
          <div className="to-meta">JUN 14 – JUN 21, 2026 · Ellis + Riley Howe</div>
          <div className="to-stats">
            <div className="to-stat"><div className="k">Booked</div><div className="v">{tripBooked}</div></div>
            <div className="to-stat"><div className="k">To decide</div><div className="v">{tripDecide}</div></div>
            <div className="to-stat"><div className="k">Must-do</div><div className="v">{tripMust}</div></div>
            <div className="to-stat"><div className="k">Activity cost</div><div className="v">${tripCost.toLocaleString()}</div></div>
          </div>
        </div>
        <div className="to-map">
          <MapPlaceholder scale="region" cities={TRIP.countries.flatMap(c => c.cities).map(c => c.name)} />
        </div>
      </div>

      {TRIP.countries.map(c => (
        <div className="to-country" key={c.id}>
          <div className="to-country-h">
            <div className="to-flag">{c.flag}</div>
            <div className="to-country-name">{c.name}</div>
            <div className="to-country-meta">{c.cities.length} cities · {c.cities.reduce((s,city)=>s+city.days.length,0)} days</div>
          </div>
          {c.cities.map(city => (
            <div className="to-city-block" key={city.id}>
              <button
                className="to-city-h"
                style={{background: CITY_TINT_STRONG[city.id]}}
                onClick={() => onPickCity(city.id)}
              >
                <span className="caps" style={{fontSize:13}}>{city.name}</span>
                <span style={{fontSize:11, opacity:0.7}}>{city.subtitle}</span>
                <span className="to-city-open">View city ›</span>
              </button>
              {city.days.map(d => {
                const acts = ACTIVITIES[d.id] || [];
                const must = acts.filter(a => a.priority === "must");
                const w = WEATHER[d.id];
                const hotel = HOTELS[city.id];
                return (
                  <button className="to-day-row" key={d.id} onClick={() => onPickDay(d.id)}>
                    <div className="to-day-n">
                      <div className="caps" style={{fontSize:9, color:"var(--ink-3)"}}>DAY</div>
                      <div style={{fontFamily:"Archivo", fontWeight:900, fontSize:22, letterSpacing:"-0.02em"}}>{d.n}</div>
                    </div>
                    <div className="to-day-info">
                      <div className="to-day-title">{d.title}</div>
                      <div className="to-day-meta">{d.date} · {city.name}</div>
                    </div>
                    <div className="to-day-weather">
                      {w.icon === "sun" ? <Icon.sun /> : w.icon === "rain" ? <Icon.rain /> : <Icon.cloud />}
                      <span>{w.hi}°F/{w.lo}°F</span>
                    </div>
                    <div className="to-day-hotel">
                      <div className="caps" style={{fontSize:9, color:"var(--ink-3)"}}>STAY</div>
                      <div style={{fontSize:11.5}}>{hotel?.name || "—"}</div>
                    </div>
                    <div className="to-day-musts">
                      {must.slice(0, 2).map((a, i) => (
                        <div key={i} className="to-must">{a.title}</div>
                      ))}
                      {must.length > 2 && <div className="to-must-more">+{must.length - 2} more</div>}
                    </div>
                    <div className="to-day-stats">
                      <span className="to-count">{acts.length} <span className="caps" style={{fontSize:9, color:"var(--ink-3)"}}>plans</span></span>
                    </div>
                  </button>
                );
              })}
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

/* ============================================================
   CITY OVERVIEW
============================================================ */
function CityOverview({ city, country, onPickDay, onOpenActivity }) {
  const cityActivities = city.days.flatMap(d => (ACTIVITIES[d.id] || []).map(a => ({...a, dayId: d.id, day: d})));
  const must = cityActivities.filter(a => a.priority === "must");
  const booked = cityActivities.filter(a => a.status === "booked");
  const decide = cityActivities.filter(a => a.status === "decide");
  const totalCost = cityActivities.reduce((s, a) => s + (a.cost || 0), 0);
  const hotel = HOTELS[city.id];
  const foodRecs = FOOD[city.id] || [];

  return (
    <div className="city-overview">
      <div className="co-hero" style={{background: CITY_TINT_STRONG[city.id]}}>
        <div className="co-hero-tag caps">{country.name}</div>
        <h2 className="co-h2 caps">{city.name}</h2>
        <div className="co-hero-meta">{city.subtitle} · {city.days.length} days</div>
        <div className="co-hero-dates caps">{city.days[0].date} → {city.days[city.days.length-1].date}</div>
      </div>

      <div className="co-stats">
        <div className="co-stat"><div className="k">Days</div><div className="v">{city.days.length}</div></div>
        <div className="co-stat"><div className="k">Activities</div><div className="v">{cityActivities.length}</div></div>
        <div className="co-stat"><div className="k">Must-do</div><div className="v">{must.length}</div></div>
        <div className="co-stat"><div className="k">Booked</div><div className="v">{booked.length}</div></div>
        <div className="co-stat"><div className="k">To decide</div><div className="v">{decide.length}</div></div>
        <div className="co-stat"><div className="k">Cost</div><div className="v">${totalCost.toLocaleString()}</div></div>
      </div>

      <div className="co-grid">
        <div className="co-map-card card">
          <div className="card-h"><span className="lbl">Map</span><a className="a" href="#">Open</a></div>
          <MapPlaceholder scale="city" cityName={city.name} pins={cityActivities.slice(0, 6).map(a => a.title)} />
        </div>

        {hotel && (
          <div className="co-hotel-card card">
            <div className="card-h"><span className="lbl">Where you're staying</span><a className="a" href="#">Reservation</a></div>
            <div className="co-hotel">
              <div className="co-hotel-img" style={{background: CITY_TINT_STRONG[city.id]}}>
                <div className="co-hotel-mark caps">{hotel.name.split(" ").map(w => w[0]).join("").slice(0,3)}</div>
              </div>
              <div>
                <div className="co-hotel-dates caps">{hotel.dates}</div>
                <div className="co-hotel-name caps">{hotel.name}</div>
                <div className="co-hotel-row"><Icon.pin /> {hotel.addr}</div>
                <div className="co-hotel-row"><Icon.phone /> {hotel.phone}</div>
                <div className="co-hotel-row"><span className="caps" style={{fontSize:10, color:"var(--ink-3)"}}>CONF</span><span style={{fontFamily:"JetBrains Mono, monospace", fontSize:11.5}}>{hotel.conf}</span></div>
              </div>
            </div>
          </div>
        )}
      </div>

      <div className="co-section">
        <div className="co-section-h">
          <span className="caps">Days here</span>
          <span style={{fontSize:11, color:"var(--ink-3)"}}>{city.days.length} days</span>
        </div>
        <div className="co-days">
          {city.days.map(d => {
            const acts = ACTIVITIES[d.id] || [];
            return (
              <button className="co-day-card" key={d.id} onClick={() => onPickDay(d.id)}>
                <div className="co-day-head">
                  <div>
                    <div className="caps" style={{fontSize:9.5, color:"var(--ink-3)"}}>Day {d.n}</div>
                    <div className="co-day-date caps">{d.date}</div>
                  </div>
                  <div className="caps" style={{fontSize:9, color:"var(--ink-3)"}}>{acts.length} plans</div>
                </div>
                <div className="co-day-title caps">{d.title}</div>
                <div className="co-day-acts">
                  {acts.slice(0, 4).map((a, i) => (
                    <div key={i} className="co-day-act">
                      <span className="co-day-act-time">{a.time}</span>
                      <span className="co-day-act-title">{a.title}</span>
                    </div>
                  ))}
                  {acts.length > 4 && <div className="co-day-more">+{acts.length - 4} more</div>}
                </div>
              </button>
            );
          })}
        </div>
      </div>

      {foodRecs.length > 0 && (
        <div className="co-section">
          <div className="co-section-h">
            <span className="caps">Eats</span>
            <span style={{fontSize:11, color:"var(--ink-3)"}}>{foodRecs.length} picks</span>
          </div>
          <div className="co-food">
            {["quick", "nice"].map(tier => {
              const items = foodRecs.filter(f => f.tier === tier);
              if (!items.length) return null;
              return (
                <React.Fragment key={tier}>
                  <div style={{fontSize:10, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.08em", color:"var(--ink-3)", margin:"8px 0 4px"}}>{tier === "quick" ? "Quick & Local" : "Nice Restaurants"}</div>
                  {items.map((f, i) => (
                    <div key={i} className="co-food-item" style={{cursor: f.url ? "pointer" : "default"}} onClick={() => f.url && window.open(f.url, "_blank")}>
                      <div className="co-food-thumb" style={{background: `oklch(0.92 0.04 ${f.hue})`}}>
                        <span className="caps" style={{color:`oklch(0.4 0.1 ${f.hue})`, fontSize:14}}>{f.name.split(" ").map(w => w[0]).slice(0,2).join("")}</span>
                      </div>
                      <div style={{minWidth:0, flex:1}}>
                        <div className="caps" style={{fontSize:12, fontWeight:900}}>{f.name}{f.url && <span style={{marginLeft:4, opacity:0.5, fontSize:10}}>↗</span>}</div>
                        <div style={{fontSize:11, color:"var(--ink-3)"}}>{f.cuisine} · <b style={{color:"var(--ink-2)"}}>{f.price}</b> · {f.dist}</div>
                        <div style={{fontSize:11, color:"var(--ink-2)", marginTop:2}}>{f.note}</div>
                      </div>
                      <div className="co-food-rating"><Icon.star /> {f.rating}</div>
                    </div>
                  ))}
                </React.Fragment>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

function ActivityDrawer({ a, onClose, onResolve, onUnresolve, isResolved }) {
  const statusLabel = { booked: "Booked", hold: "On hold", decide: "Decide" }[a.status] || "";
  const StatusIcon = a.status === "booked" ? Icon.checkSm : a.status === "hold" ? Icon.clock : Icon.q;
  const gradient =
    a.tone === "mint" ? "var(--grad-do)" :
    a.tone === "hot" ? "var(--grad-eat)" :
    a.tone === "accent" ? "var(--grad-travel)" : "var(--grad-warm)";
  const isFlight = a.type === "flight";
  const isEat = a.type === "eat";

  return (
    <React.Fragment>
      <div className="drawer-backdrop" onClick={onClose}></div>
      <aside className="activity-drawer" onClick={(e) => e.stopPropagation()}>
        <button className="drawer-close" onClick={onClose}>×</button>

        <div className="drawer-hero" style={{background: gradient}}>
          <div className="drawer-hero-overlay">
            <div className="caps" style={{color:"white", fontSize:10, opacity:0.85}}>{a.type === "do" ? "Activity" : a.type}</div>
          </div>
        </div>

        <div className="drawer-body">
          <div className="drawer-title caps">{a.title}</div>
          <div className="drawer-meta">{a.meta}</div>

          <div className="drawer-row">
            {a.rating && (
              <span className="drawer-rating">
                <Icon.star /> {a.rating} <span style={{color:"var(--ink-3)", fontWeight:400}}>({a.reviews?.toLocaleString()})</span>
              </span>
            )}
            {a.tags && a.tags.map((t, i) => <span key={i} className="tag">{t}</span>)}
          </div>

          {(a.status || a.priority === "must" || a.weather) && (
            <div className="drawer-row" style={{marginTop:8}}>
              {a.status && (
                <span className={"status-badge " + a.status}>
                  <StatusIcon /> {statusLabel}
                </span>
              )}
              {a.priority === "must" && (
                <span className="priority-flag must"><span className="pdot"></span>Must-do</span>
              )}
              {a.weather && <span className="weather-chip"><Icon.cloud /> Weather-dependent</span>}
            </div>
          )}

          {/* Time block */}
          <div className="drawer-section">
            <div className="drawer-section-h caps">When</div>
            <div className="drawer-time">
              <div>
                <div className="caps" style={{fontSize:9.5, color:"var(--ink-3)"}}>Start</div>
                <div style={{fontFamily:"Archivo", fontWeight:900, fontSize:22, letterSpacing:"-0.02em"}}>{a.time}</div>
              </div>
              <div style={{flex:1, height:1, background:"var(--line)", margin:"0 12px"}}></div>
              <div>
                <div className="caps" style={{fontSize:9.5, color:"var(--ink-3)"}}>End</div>
                <div style={{fontFamily:"Archivo", fontWeight:900, fontSize:22, letterSpacing:"-0.02em"}}>{a.end}</div>

            <div className="drawer-section-h caps">About</div>

              {longDescription(a)}
            </div>
          </div>

          {/* Directions */}
          {(a.mapUrl || addressFor(a)) && (
            <div className="drawer-section">
              <div className="drawer-section-h caps">Location</div>
              <div className="drawer-map">
                {a.mapUrl && (
                  <iframe
                    width="100%"

                    frameBorder="0"
                    style={{borderRadius:10, display:"block", border:"1px solid var(--line)"}}

                    <Icon.pin />

                  <div className="drawer-dir-actions">

                  <a className="drawer-link" href={a.url} target="_blank" rel="noopener noreferrer">

                      <div style={{fontWeight:600, fontSize:13}}>{websiteFor(a)}</div>

                  <a className="drawer-link" href={a.url} target="_blank" rel="noopener noreferrer">

                      <div style={{fontWeight:600, fontSize:13}}>Booking confirmation PDF</div>

                    </div>
                    <Icon.chevR />
                  </a>
                )}
                {/* Confirmation number */}
                {a.status === "booked" && a.conf && a.conf !== "NOT BOOKED" && (
                  <div className="drawer-ticket">
                    <div className="drawer-ticket-l">
                      <div className="caps" style={{fontSize:9.5, color:"rgba(255,255,255,0.7)"}}>Confirmation</div>
                      <div style={{fontFamily:"JetBrains Mono, monospace", fontSize:14, color:"white", marginTop:4}}>{a.conf}</div>
                      <div className="caps" style={{fontSize:9, color:"rgba(255,255,255,0.6)", marginTop:6}}>Show at check-in</div>

                    <div className="drawer-ticket-qr"></div>
                  </div>

                {a.cancelBy && (
                  <div className="drawer-cancel">
                    <span className="caps" style={{fontSize:10, color:"var(--ink-3)"}}>Cancel by</span>
                    <span style={{fontFamily:"JetBrains Mono, monospace", fontSize:12, color:"var(--ink-2)"}}>{a.cancelBy}</span>
                  </div>
                )}
              </div>
            </div>
          )}

          {/* Cost */}
          {a.cost && (
            <div className="drawer-section">
              <div className="drawer-section-h caps">Cost</div>
              <div style={{display:"flex", alignItems:"baseline", gap:8}}>
                <span style={{fontFamily:"Archivo", fontWeight:900, fontSize:22, letterSpacing:"-0.02em"}}>${a.cost}</span>
                <span className="caps" style={{fontSize:10, color:"var(--ink-3)"}}>USD · for 2 travelers</span>
              </div>
            </div>
          )}

          {/* Notes */}
          <div className="drawer-section">
            <div className="drawer-section-h caps">Your notes</div>

          </div>
        </div>
        {(a.status === "decide" || a.status === "hold") && (
          <div style={{padding:"10px 14px", borderTop:"1px solid var(--line)"}}>
            {isResolved ? (
              <button
                onClick={() => onUnresolve && onUnresolve(a.title)}
                style={{width:"100%", padding:"9px 12px", background:"var(--surface-2)", color:"var(--ink-2)", border:"1px solid var(--line)", borderRadius:8, fontFamily:'"Archivo",sans-serif', fontWeight:800, fontSize:11, textTransform:"uppercase", letterSpacing:"0.05em", cursor:"pointer"}}
