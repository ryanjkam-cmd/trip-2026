name: QA — trip dashboard

on:
  push:
    branches: [main]

jobs:
  qa:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Wait for GitHub Pages to deploy (60s)
        run: sleep 60

      - name: Run QA suite
        env:
          QA_URL: https://ryanjkam-cmd.github.io/trip-2026/
          QA_OUT: /tmp
        run: node qa/test.js

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qa-screenshots-${{ github.sha }}
          path: /tmp/qa_*.png
          retention-days: 7

      - name: Upload report always
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-report-${{ github.sha }}
          path: /tmp/qa_report.json
          retention-days: 14
